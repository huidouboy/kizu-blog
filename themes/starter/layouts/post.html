<!doctype html>
<html lang="{{site.language}}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{content.description}}">
    <title>{{content.title}} - {{site.title}}</title>
    <link rel="stylesheet" href="../../assets/theme/tokens.css">
    <link rel="stylesheet" href="../../assets/theme/global.css">
    {{ui.script}}
  </head>
  <body class="starter-theme" style="--accent: {{theme.settings.accentColor}}">
    <header class="site-header">
      <a class="brand" href="../../index.html">{{site.title}}</a>
      {{site.navigation}}
    </header>
    <main>
      <article class="article">
        <p class="eyebrow">{{ui.publishedOn}} {{content.date}} · {{content.readingTime}}</p>
        <h1>{{content.title}}</h1>
        <p class="description">{{content.description}}</p>
        <div class="tags">{{content.tags}}</div>
        <div class="content">{{content.content}}</div>
        <nav class="post-nav">{{content.previous}} {{content.next}}</nav>
      </article>
    </main>
    <footer class="site-footer">{{site.title}} by {{site.author}}</footer>
  </body>
</html>
