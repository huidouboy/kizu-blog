{{> document-open}}
  <main id="content" class="article-shell">
    {{{ slot.beforeContent }}}
    <article class="article article--page">
      <header class="article__header">
        <h1>{{ page.title }}</h1>
        {{#if page.description}}
          <p>{{ page.description }}</p>
        {{/if}}
      </header>
      <div class="article__content">
        {{{ page.html }}}
      </div>
    </article>
    {{{ slot.afterContent }}}
  </main>
{{> document-close}}
