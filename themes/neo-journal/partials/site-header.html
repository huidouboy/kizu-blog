  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="/" aria-label="{{ site.title }}">
        <span class="brand__mark">K</span>
        <span>
          <strong>{{ site.title }}</strong>
          <small>{{ site.subtitle }}</small>
        </span>
      </a>
      <div class="site-actions">
        <nav class="site-nav" aria-label="主导航">
          {{#each navigation}}
            <a href="{{ this.url }}">{{ this.label }}</a>
          {{/each}}
        </nav>
        <button class="account-button" type="button" data-auth-open aria-label="账号">
          <span data-account-initial>我</span>
        </button>
      </div>
    </div>
  </header>
